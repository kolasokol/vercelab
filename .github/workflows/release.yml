name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: package
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [ -z "$version" ]; then
            echo "::error::Failed to read version from package.json"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches package version
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          expected_tag="v${VERSION}"
          if [ "$TAG" != "$expected_tag" ]; then
            echo "::error title=Tag/version mismatch::Tag '$TAG' does not match package.json version '$VERSION'. Expected '$expected_tag'."
            exit 1
          fi

      - name: Create release body
        env:
          TAG: ${{ github.ref_name }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          set -euo pipefail
          cat > release-body.md <<EOF
          # Release ${TAG}

          This release was generated from package.json version ${VERSION}.
          EOF

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          generate_release_notes: true
